<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 860" font-family="Segoe UI, Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="720" height="860" fill="#ffffff" rx="8"/>

  <!-- Title bar -->
  <rect x="20" y="12" width="680" height="32" rx="6" fill="#7C3AED"/>
  <text x="360" y="33" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">Block 2 — Interactive Prompt Builder</text>

  <!-- ═══════ GLOBAL FIELDS ═══════ -->

  <!-- Image folder -->
  <text x="32" y="72" font-size="11" fill="#475569" font-weight="600">Image folder</text>
  <rect x="140" y="58" width="340" height="24" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="74" font-size="10.5" fill="#1E293B" font-family="Consolas, monospace">streetscapes_nice_2025</text>

  <!-- Role -->
  <text x="32" y="104" font-size="11" fill="#475569" font-weight="600">Role (global)</text>
  <rect x="140" y="90" width="548" height="50" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="108" font-size="10" fill="#1E293B">You are an expert urban morphologist analyzing street-level photographs</text>
  <text x="150" y="122" font-size="10" fill="#1E293B">of French cities. Answer precisely using only what is visible in the image.</text>

  <!-- Nb tasks -->
  <text x="32" y="162" font-size="11" fill="#475569" font-weight="600">Nb tasks</text>
  <rect x="140" y="148" width="120" height="24" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <rect x="140" y="148" width="60" height="24" rx="4" fill="#7C3AED" opacity="0.15"/>
  <circle cx="200" cy="160" r="6" fill="#7C3AED"/>
  <text x="270" y="164" font-size="10" fill="#64748B">2</text>

  <!-- ═══════ TASK #1 ═══════ -->
  <rect x="20" y="185" width="680" height="282" rx="8" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="36" y="208" font-size="12" font-weight="700" fill="#1E293B">Task #1</text>

  <!-- Type dropdown -->
  <text x="36" y="232" font-size="10.5" fill="#475569" font-weight="600">Type 1</text>
  <rect x="140" y="218" width="260" height="22" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="233" font-size="10" fill="#1E293B">Numeric (counts, scores)</text>
  <text x="386" y="233" font-size="9" fill="#94A3B8">▼</text>

  <!-- Col -->
  <text x="36" y="258" font-size="10.5" fill="#475569" font-weight="600">Col 1</text>
  <rect x="140" y="244" width="260" height="22" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="259" font-size="10" fill="#1E293B" font-family="Consolas, monospace">frontage_length</text>

  <!-- Task -->
  <text x="36" y="284" font-size="10.5" fill="#475569" font-weight="600">Task 1</text>
  <rect x="140" y="270" width="548" height="40" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="286" font-size="10" fill="#1E293B">Estimate the total length in meters of the building frontage</text>
  <text x="150" y="300" font-size="10" fill="#1E293B">visible on the ground floor of this street photograph.</text>

  <!-- Theory -->
  <text x="36" y="326" font-size="10.5" fill="#475569" font-weight="600">Theory 1</text>
  <rect x="140" y="314" width="548" height="48" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="330" font-size="10" fill="#1E293B">A frontage is the face of a building at street level. Use parked cars</text>
  <text x="150" y="344" font-size="10" fill="#1E293B">(~4.5m), doors (~0.9m) or windows (~1.2m) as scale references.</text>

  <!-- Format -->
  <text x="36" y="380" font-size="10.5" fill="#475569" font-weight="600">Format 1</text>
  <rect x="140" y="366" width="548" height="24" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="382" font-size="10" fill="#1E293B">Answer with a single integer (meters). Example: 15</text>

  <!-- Help text -->
  <text x="140" y="406" font-size="9" fill="#94A3B8" font-style="italic">Numeric: extracts numbers | Category: returns classification text | Boolean: normalizes to 1/0 | Text: raw response</text>

  <!-- Advanced Reasoning section -->
  <line x1="36" y1="416" x2="688" y2="416" stroke="#E2E8F0" stroke-width="1"/>
  <text x="36" y="432" font-size="10.5" font-weight="700" fill="#475569">🧠 Advanced Reasoning</text>
  <rect x="140" y="420" width="14" height="14" rx="2" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="160" y="432" font-size="10" fill="#475569">Enable advanced reasoning (chain-of-thought)</text>

  <!-- Consensus section -->
  <line x1="36" y1="444" x2="688" y2="444" stroke="#E2E8F0" stroke-width="1"/>
  <text x="36" y="460" font-size="10.5" font-weight="700" fill="#475569">🔄 Consensus Validation</text>
  <rect x="140" y="448" width="14" height="14" rx="2" fill="#7C3AED" stroke="#7C3AED" stroke-width="1"/>
  <text x="143" y="459" font-size="9" fill="#fff" font-weight="700">✓</text>
  <text x="160" y="460" font-size="10" fill="#1E293B">Enable consensus validation</text>

  <!-- Consensus options (visible because checked) -->
  <text x="160" y="478" font-size="10" fill="#475569">Runs</text>
  <rect x="200" y="466" width="80" height="20" rx="3" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="210" y="480" font-size="9.5" fill="#1E293B">3 runs</text>
  <text x="268" y="480" font-size="8" fill="#94A3B8">▼</text>

  <text x="300" y="478" font-size="10" fill="#475569">Tolerance %</text>
  <rect x="380" y="466" width="60" height="20" rx="3" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="390" y="480" font-size="9.5" fill="#1E293B">10.0</text>

  <!-- Cost warning -->
  <text x="160" y="498" font-size="9" fill="#EA580C" font-weight="600">⚠️ Cost: 3x API calls per image for this task</text>

  <!-- ═══════ TASK #2 ═══════ -->
  <rect x="20" y="510" width="680" height="220" rx="8" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="36" y="533" font-size="12" font-weight="700" fill="#1E293B">Task #2</text>

  <!-- Type -->
  <text x="36" y="557" font-size="10.5" fill="#475569" font-weight="600">Type 2</text>
  <rect x="140" y="543" width="260" height="22" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="558" font-size="10" fill="#1E293B">Category (classifications)</text>
  <text x="386" y="558" font-size="9" fill="#94A3B8">▼</text>

  <!-- Col -->
  <text x="36" y="583" font-size="10.5" fill="#475569" font-weight="600">Col 2</text>
  <rect x="140" y="569" width="260" height="22" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="584" font-size="10" fill="#1E293B" font-family="Consolas, monospace">vegetation_type</text>

  <!-- Task -->
  <text x="36" y="609" font-size="10.5" fill="#475569" font-weight="600">Task 2</text>
  <rect x="140" y="595" width="548" height="28" rx="4" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="150" y="613" font-size="10" fill="#1E293B">Classify the dominant vegetation type visible in this street scene.</text>

  <!-- Format - disabled (grayed out) -->
  <text x="36" y="647" font-size="10.5" fill="#475569" font-weight="600">Format 2</text>
  <rect x="140" y="633" width="548" height="24" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="150" y="649" font-size="10" fill="#94A3B8" font-style="italic">(disabled — overridden by advanced reasoning)</text>

  <!-- Advanced Reasoning (checked, with preview) -->
  <line x1="36" y1="664" x2="688" y2="664" stroke="#E2E8F0" stroke-width="1"/>
  <text x="36" y="680" font-size="10.5" font-weight="700" fill="#475569">🧠 Advanced Reasoning</text>
  <rect x="140" y="668" width="14" height="14" rx="2" fill="#7C3AED" stroke="#7C3AED" stroke-width="1"/>
  <text x="143" y="679" font-size="9" fill="#fff" font-weight="700">✓</text>
  <text x="160" y="680" font-size="10" fill="#1E293B">Enable advanced reasoning (chain-of-thought)</text>

  <text x="160" y="696" font-size="9" fill="#64748B" font-style="italic">🧠 Max tokens automatically set to 1024. Creates additional column for reasoning text.</text>

  <!-- Format preview -->
  <rect x="160" y="702" width="520" height="24" rx="3" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="170" y="714" font-size="9" fill="#5B21B6" font-weight="600">Format (auto): </text>
  <text x="260" y="714" font-size="9" fill="#5B21B6" font-family="Consolas, monospace">First, describe ... then write only: ANSWER: &lt;category number&gt;</text>

  <!-- ═══════ GENERATION PARAMETERS ═══════ -->
  <rect x="20" y="742" width="680" height="80" rx="8" fill="#FAFBFC" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Row 1: sampling controls -->
  <rect x="36" y="754" width="12" height="12" rx="2" fill="#7C3AED" stroke="#7C3AED" stroke-width="1"/>
  <text x="39" y="764" font-size="8" fill="#fff" font-weight="700">✓</text>
  <text x="54" y="764" font-size="10" fill="#475569">Enable sampling</text>

  <text x="180" y="764" font-size="10" fill="#475569">Temperature</text>
  <rect x="260" y="752" width="60" height="16" rx="3" fill="#E2E8F0"/>
  <rect x="260" y="752" width="18" height="16" rx="3" fill="#7C3AED"/>
  <text x="330" y="764" font-size="10" fill="#1E293B">0.3</text>

  <text x="370" y="764" font-size="10" fill="#475569">Top-p</text>
  <rect x="410" y="752" width="60" height="16" rx="3" fill="#E2E8F0"/>
  <rect x="410" y="752" width="54" height="16" rx="3" fill="#7C3AED"/>
  <text x="480" y="764" font-size="10" fill="#1E293B">0.9</text>

  <text x="520" y="764" font-size="10" fill="#475569">Max tokens</text>
  <rect x="600" y="752" width="60" height="16" rx="3" fill="#E2E8F0"/>
  <rect x="600" y="752" width="6" height="16" rx="3" fill="#7C3AED"/>
  <text x="668" y="764" font-size="10" fill="#1E293B">50</text>

  <!-- Row 2: seed + display -->
  <rect x="36" y="778" width="12" height="12" rx="2" fill="#fff" stroke="#CBD5E1" stroke-width="1"/>
  <text x="54" y="788" font-size="10" fill="#475569">Use fixed seed</text>
  <rect x="160" y="776" width="50" height="16" rx="3" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="170" y="788" font-size="10" fill="#94A3B8">42</text>

  <rect x="260" y="778" width="12" height="12" rx="2" fill="#7C3AED" stroke="#7C3AED" stroke-width="1"/>
  <text x="263" y="788" font-size="8" fill="#fff" font-weight="700">✓</text>
  <text x="278" y="788" font-size="10" fill="#475569">Display images during scoring</text>

  <!-- Apply button -->
  <rect x="260" y="806" width="200" height="30" rx="6" fill="#16A34A"/>
  <text x="360" y="825" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Apply paths + tasks + settings</text>

  <!-- ═══════ CAPTION ═══════ -->
  <text x="360" y="854" fill="#555" font-size="10.5" text-anchor="middle">
    <tspan font-weight="700">Figure 2.</tspan> Block 2 prompt builder showing a two-task urban morphology configuration with consensus and advanced reasoning.
  </text>

</svg>
