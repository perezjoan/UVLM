<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="#ffffff" rx="8"/>

  <!-- ═══════════════ BLOCK 1 ═══════════════ -->
  <g transform="translate(20, 16)">
    <!-- Header -->
    <rect width="290" height="52" rx="10" ry="10" fill="#1D4ED8"/>
    <rect y="40" width="290" height="12" fill="#1D4ED8"/>
    <text x="145" y="26" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Block 1</text>
    <text x="145" y="44" fill="#ffffffdd" font-size="10.5" text-anchor="middle">Model Loading &amp; Hardware Configuration</text>

    <!-- Body -->
    <rect y="52" width="290" height="230" rx="0" ry="0" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
    <rect y="270" width="290" height="12" rx="0" ry="0" fill="#EFF6FF" stroke="none"/>
    <rect y="270" width="290" height="12" rx="10" ry="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
    <rect y="270" width="290" height="2" fill="#EFF6FF"/>
    <!-- Cover top of bottom rounded rect -->
    <rect y="269" width="290" height="4" fill="#EFF6FF" stroke="none"/>
    <line x1="0.75" y1="269" x2="0.75" y2="275" stroke="#93C5FD" stroke-width="1.5"/>
    <line x1="289.25" y1="269" x2="289.25" y2="275" stroke="#93C5FD" stroke-width="1.5"/>

    <!-- Component 1 -->
    <rect x="12" y="64" width="266" height="46" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="28" y="83" font-size="16">📋</text>
    <text x="50" y="82" font-size="11.5" font-weight="700" fill="#1E293B">Model Registry</text>
    <text x="50" y="98" font-size="10" fill="#475569">Dropdown: 7 LLaVA-NeXT + 4 Qwen2.5-VL</text>

    <!-- Component 2 -->
    <rect x="12" y="118" width="266" height="46" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="28" y="137" font-size="16">🔍</text>
    <text x="50" y="136" font-size="11.5" font-weight="700" fill="#1E293B">Backend Detection</text>
    <text x="50" y="152" font-size="10" fill="#475569">Auto-detects LLaVA vs Qwen from model ID</text>

    <!-- Component 3 -->
    <rect x="12" y="172" width="266" height="46" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="28" y="191" font-size="16">⚙️</text>
    <text x="50" y="190" font-size="11.5" font-weight="700" fill="#1E293B">Precision Selector</text>
    <text x="50" y="206" font-size="10" fill="#475569">FP16 / 8-bit / 4-bit (BitsAndBytes)</text>

    <!-- Component 4 -->
    <rect x="12" y="226" width="266" height="46" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="28" y="245" font-size="16">🖥️</text>
    <text x="50" y="244" font-size="11.5" font-weight="700" fill="#1E293B">Device Map</text>
    <text x="50" y="260" font-size="10" fill="#475569">GPU-only / auto / CPU offload</text>

    <!-- Output arrow -->
    <line x1="145" y1="282" x2="145" y2="300" stroke="#64748B" stroke-width="1.5"/>
    <polygon points="145,306 140,296 150,296" fill="#64748B"/>

    <!-- Output badge -->
    <rect x="52" y="308" width="186" height="26" rx="13" fill="#1D4ED8"/>
    <text x="145" y="325" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">model + processor</text>
  </g>

  <!-- ═══════════════ BLOCK 2 ═══════════════ -->
  <g transform="translate(335, 16)">
    <!-- Header -->
    <rect width="290" height="52" rx="10" ry="10" fill="#7C3AED"/>
    <rect y="40" width="290" height="12" fill="#7C3AED"/>
    <text x="145" y="26" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Block 2</text>
    <text x="145" y="44" fill="#ffffffdd" font-size="10.5" text-anchor="middle">Inference Configuration &amp; Prompt Builder</text>

    <!-- Body -->
    <rect y="52" width="290" height="230" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
    <rect y="270" width="290" height="12" rx="10" ry="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
    <rect y="269" width="290" height="4" fill="#F5F3FF" stroke="none"/>
    <line x1="0.75" y1="269" x2="0.75" y2="275" stroke="#C4B5FD" stroke-width="1.5"/>
    <line x1="289.25" y1="269" x2="289.25" y2="275" stroke="#C4B5FD" stroke-width="1.5"/>

    <!-- Component 1 -->
    <rect x="12" y="64" width="266" height="36" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
    <text x="28" y="86" font-size="14">✏️</text>
    <text x="48" y="80" font-size="11.5" font-weight="700" fill="#1E293B">Multi-Task Prompt Form</text>
    <text x="48" y="93" font-size="10" fill="#475569">Up to 10 tasks: column, prompt, type</text>

    <!-- Component 2 -->
    <rect x="12" y="108" width="266" height="36" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
    <text x="28" y="130" font-size="14">🏷️</text>
    <text x="48" y="124" font-size="11.5" font-weight="700" fill="#1E293B">Task Type Selector</text>
    <text x="48" y="137" font-size="10" fill="#475569">numeric / category / boolean / text</text>

    <!-- Component 3 -->
    <rect x="12" y="152" width="266" height="36" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
    <text x="28" y="174" font-size="14">🎛️</text>
    <text x="48" y="168" font-size="11.5" font-weight="700" fill="#1E293B">Generation Parameters</text>
    <text x="48" y="181" font-size="10" fill="#475569">temperature, top-p, max tokens, seed</text>

    <!-- Component 4 -->
    <rect x="12" y="196" width="266" height="36" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
    <text x="28" y="218" font-size="14">🔁</text>
    <text x="48" y="212" font-size="11.5" font-weight="700" fill="#1E293B">Consensus Toggle</text>
    <text x="48" y="225" font-size="10" fill="#475569">Per-task: majority voting (2–5 runs)</text>

    <!-- Component 5 -->
    <rect x="12" y="240" width="266" height="36" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
    <text x="28" y="262" font-size="14">🧠</text>
    <text x="48" y="256" font-size="11.5" font-weight="700" fill="#1E293B">Advanced Reasoning Toggle</text>
    <text x="48" y="269" font-size="10" fill="#475569">Per-task: chain-of-thought prompting</text>

    <!-- Output arrow -->
    <line x1="145" y1="282" x2="145" y2="300" stroke="#64748B" stroke-width="1.5"/>
    <polygon points="145,306 140,296 150,296" fill="#64748B"/>

    <!-- Output badge -->
    <rect x="62" y="308" width="166" height="26" rx="13" fill="#7C3AED"/>
    <text x="145" y="325" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">TASK_SPECS list</text>
  </g>

  <!-- ═══════════════ BLOCK 3 ═══════════════ -->
  <g transform="translate(650, 16)">
    <!-- Header -->
    <rect width="290" height="52" rx="10" ry="10" fill="#0F766E"/>
    <rect y="40" width="290" height="12" fill="#0F766E"/>
    <text x="145" y="26" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Block 3</text>
    <text x="145" y="44" fill="#ffffffdd" font-size="10.5" text-anchor="middle">Batch Execution Engine</text>

    <!-- Body -->
    <rect y="52" width="290" height="230" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1.5"/>
    <rect y="270" width="290" height="12" rx="10" ry="10" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1.5"/>
    <rect y="269" width="290" height="4" fill="#F0FDFA" stroke="none"/>
    <line x1="0.75" y1="269" x2="0.75" y2="275" stroke="#99F6E4" stroke-width="1.5"/>
    <line x1="289.25" y1="269" x2="289.25" y2="275" stroke="#99F6E4" stroke-width="1.5"/>

    <!-- Component 1 -->
    <rect x="12" y="64" width="266" height="46" rx="6" fill="#CCFBF1" stroke="#99F6E4" stroke-width="1"/>
    <text x="28" y="83" font-size="16">📁</text>
    <text x="50" y="82" font-size="11.5" font-weight="700" fill="#1E293B">Image Folder Iterator</text>
    <text x="50" y="98" font-size="10" fill="#475569">Scans folder for images</text>

    <!-- Component 2 -->
    <rect x="12" y="118" width="266" height="46" rx="6" fill="#CCFBF1" stroke="#99F6E4" stroke-width="1"/>
    <text x="28" y="137" font-size="16">🔄</text>
    <text x="50" y="136" font-size="11.5" font-weight="700" fill="#1E293B">Per-Image Per-Task Loop</text>
    <text x="50" y="152" font-size="10" fill="#475569">All tasks sequentially for each image</text>

    <!-- Component 3 -->
    <rect x="12" y="172" width="266" height="46" rx="6" fill="#CCFBF1" stroke="#99F6E4" stroke-width="1"/>
    <text x="28" y="191" font-size="16">🛡️</text>
    <text x="50" y="190" font-size="11.5" font-weight="700" fill="#1E293B">Resume Mode</text>
    <text x="50" y="206" font-size="10" fill="#475569">Skips processed images, upgrades schema</text>

    <!-- Component 4 -->
    <rect x="12" y="226" width="266" height="46" rx="6" fill="#CCFBF1" stroke="#99F6E4" stroke-width="1"/>
    <text x="28" y="245" font-size="16">📊</text>
    <text x="50" y="244" font-size="11.5" font-weight="700" fill="#1E293B">CSV Writer</text>
    <text x="50" y="260" font-size="10" fill="#475569">One row/image, one column/task + raw</text>

    <!-- Output arrow -->
    <line x1="145" y1="282" x2="145" y2="300" stroke="#64748B" stroke-width="1.5"/>
    <polygon points="145,306 140,296 150,296" fill="#64748B"/>

    <!-- Output badge -->
    <rect x="72" y="308" width="146" height="26" rx="13" fill="#0F766E"/>
    <text x="145" y="325" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">results.csv</text>
  </g>

  <!-- ═══════════════ DATA FLOW ═══════════════ -->
  <g transform="translate(0, 370)">
    <text x="480" y="10" fill="#64748B" font-size="10.5" font-weight="700" text-anchor="middle" letter-spacing="1">DATA FLOW</text>

    <!-- HF Hub -->
    <rect x="30" y="24" width="120" height="44" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="90" y="44" fill="#78350F" font-size="11" font-weight="600" text-anchor="middle">🤗 Hugging Face</text>
    <text x="90" y="58" fill="#78350F" font-size="10" text-anchor="middle">Model Hub</text>

    <!-- Arrow 1 -->
    <line x1="155" y1="46" x2="186" y2="46" stroke="#64748B" stroke-width="1.5"/>
    <polygon points="190,46 183,42 183,50" fill="#64748B"/>

    <!-- Block 1 box -->
    <rect x="194" y="24" width="110" height="44" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <text x="249" y="43" fill="#1E3A5F" font-size="11" font-weight="600" text-anchor="middle">Block 1</text>
    <text x="249" y="57" fill="#1E3A5F" font-size="9.5" text-anchor="middle">Load &amp; configure</text>

    <!-- Arrow 2 -->
    <line x1="308" y1="46" x2="345" y2="46" stroke="#64748B" stroke-width="1.5"/>
    <polygon points="349,46 342,42 342,50" fill="#64748B"/>
    <text x="329" y="38" fill="#64748B" font-size="8.5" text-anchor="middle" font-style="italic">model +</text>
    <text x="329" y="58" fill="#64748B" font-size="8.5" text-anchor="middle" font-style="italic">processor</text>

    <!-- Block 2 box -->
    <rect x="353" y="24" width="110" height="44" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
    <text x="408" y="43" fill="#3B1F6E" font-size="11" font-weight="600" text-anchor="middle">Block 2</text>
    <text x="408" y="57" fill="#3B1F6E" font-size="9.5" text-anchor="middle">Define tasks</text>

    <!-- Arrow 3 -->
    <line x1="467" y1="46" x2="507" y2="46" stroke="#64748B" stroke-width="1.5"/>
    <polygon points="511,46 504,42 504,50" fill="#64748B"/>
    <text x="489" y="38" fill="#64748B" font-size="8.5" text-anchor="middle" font-style="italic">TASK_</text>
    <text x="489" y="58" fill="#64748B" font-size="8.5" text-anchor="middle" font-style="italic">SPECS</text>

    <!-- Block 3 box -->
    <rect x="515" y="24" width="110" height="44" rx="8" fill="#CCFBF1" stroke="#14B8A6" stroke-width="2"/>
    <text x="570" y="43" fill="#134E4A" font-size="11" font-weight="600" text-anchor="middle">Block 3</text>
    <text x="570" y="57" fill="#134E4A" font-size="9.5" text-anchor="middle">Execute</text>

    <!-- Arrow 4 -->
    <line x1="629" y1="46" x2="666" y2="46" stroke="#64748B" stroke-width="1.5"/>
    <polygon points="670,46 663,42 663,50" fill="#64748B"/>

    <!-- Output box -->
    <rect x="674" y="24" width="120" height="44" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
    <text x="734" y="43" fill="#166534" font-size="11" font-weight="600" text-anchor="middle">📄 Results CSV</text>
    <text x="734" y="57" fill="#166534" font-size="10" text-anchor="middle">Google Drive or folder</text>

    <!-- Image folder input note -->
    <text x="570" y="86" fill="#64748B" font-size="9.5" text-anchor="middle" font-style="italic">+ image folder</text>
    <line x1="570" y1="68" x2="570" y2="78" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
    <polygon points="570,68 567,73 573,73" fill="#94A3B8"/>
  </g>

  <!-- ═══════════════ EXECUTION NOTES ═══════════════ -->
  <g transform="translate(130, 480)">
    <rect width="700" height="36" rx="8" fill="#FAFBFC" stroke="#E2E8F0" stroke-width="1.5"/>

    <!-- Block 1 -->
    <circle cx="30" cy="18" r="5" fill="#1D4ED8"/>
    <text x="42" y="22" font-size="10.5" fill="#475569"><tspan font-weight="700">Block 1</tspan> — Run once per session</text>

    <!-- Block 2 -->
    <circle cx="268" cy="18" r="5" fill="#7C3AED"/>
    <text x="280" y="22" font-size="10.5" fill="#475569"><tspan font-weight="700">Block 2</tspan> — Re-run to modify tasks</text>

    <!-- Block 3 -->
    <circle cx="498" cy="18" r="5" fill="#0F766E"/>
    <text x="510" y="22" font-size="10.5" fill="#475569"><tspan font-weight="700">Block 3</tspan> — Re-run for each image set</text>
  </g>

  <!-- ═══════════════ CAPTION ═══════════════ -->
  <text x="480" y="545" fill="#555" font-size="11" text-anchor="middle">
    <tspan font-weight="700">Figure 1.</tspan> UVLM software architecture. The notebook is organized into three sequential blocks.
  </text>
  <text x="480" y="560" fill="#555" font-size="11" text-anchor="middle">
    Block 1 loads the selected VLM (once per session). Block 2 defines analysis tasks via an interactive prompt builder.
  </text>
  <text x="480" y="575" fill="#555" font-size="11" text-anchor="middle">
    Block 3 processes all images and writes results to CSV. The data flow diagram shows intermediate outputs passed between blocks.
  </text>

</svg>
